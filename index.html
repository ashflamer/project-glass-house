<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARDEN OF GUILT</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #333; font-family: 'Georgia', serif; overflow: hidden; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #fff; width: 100%; height: 100%; max-width: 800px; max-height: 600px; image-rendering: pixelated; }
        
        #vignette { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; color: #888; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
        #decay-bar { width: 120px; height: 4px; background: #222; margin-top: 5px; border: 1px solid #444; }
        #decay-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.5s; box-shadow: 0 0 8px #00ffcc; }

        #dialogue-wrap { 
            position: absolute; bottom: 30px; width: 90%; left: 5%; 
            background: #fff; border: 2px solid #000; padding: 25px; 
            display: none; z-index: 50; box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }
        #text-content { font-size: 16px; line-height: 1.5; color: #111; margin-bottom: 20px; }
        
        #input-area { display: none; margin-top: 10px; border-top: 1px solid #eee; pt: 15px; }
        #pass-input { border: 1px solid #000; padding: 10px; font-family: monospace; width: 120px; text-align: center; font-size: 18px; }
        
        .opt-btn { background: #111; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin-right: 10px; font-size: 12px; transition: 0.3s; }
        .opt-btn:hover { background: #00ffcc; color: #000; }

        #overlay { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 1s; }
        #startBtn { border: 1px solid #000; background: none; padding: 15px 40px; cursor: pointer; letter-spacing: 8px; color: #000; font-size: 14px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-weight: normal; letter-spacing: 12px;">GARDEN OF GUILT</h1>
        <button id="startBtn">SYNC CONSCIOUSNESS</button>
    </div>

    <div id="canvas-container">
        <div id="vignette"></div>
        <div id="ui">
            <div id="room-name">MAIN HALL</div>
            <div id="decay-bar"><div id="decay-fill"></div></div>
            <div style="margin-top:10px">MEMORIES: <span id="mem-count">0</span>/3</div>
        </div>
        
        <div id="dialogue-wrap">
            <div id="text-content"></div>
            <div id="input-area">
                <input type="text" id="pass-input" maxlength="4" placeholder="----">
                <button class="opt-btn" id="submit-pass">UNLOCK</button>
            </div>
            <div id="opt-container"></div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
