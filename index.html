<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARDEN OF GUILT: THE ROOMS</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #333; font-family: 'Georgia', serif; overflow: hidden; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #fff; width: 100%; height: 100%; max-width: 800px; max-height: 600px; image-rendering: pixelated; }
        
        #vignette { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.7) 100%); }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; color: #888; font-size: 12px; letter-spacing: 2px; }
        #decay-bar { width: 100px; height: 4px; background: #333; margin-top: 5px; }
        #decay-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.5s; }

        #dialogue-wrap { 
            position: absolute; bottom: 30px; width: 90%; left: 5%; 
            background: #fff; border: 2px solid #000; padding: 20px; 
            display: none; z-index: 50; 
        }
        #input-area { display: none; margin-top: 10px; }
        #pass-input { border: 1px solid #000; padding: 5px; font-family: monospace; width: 100px; text-align: center; }
        .opt-btn { background: #000; color: #fff; border: none; padding: 8px 15px; cursor: pointer; margin-right: 10px; font-size: 11px; }

        #overlay { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #startBtn { border: 1px solid #000; background: none; padding: 10px 30px; cursor: pointer; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div id="overlay"><h1>GARDEN</h1><button id="startBtn">SYNC</button></div>
    <div id="canvas-container">
        <div id="vignette"></div>
        <div id="ui">
            <div id="room-name">MAIN HALL</div>
            <div id="decay-bar"><div id="decay-fill"></div></div>
        </div>
        <div id="dialogue-wrap">
            <div id="text-content"></div>
            <div id="input-area">
                <input type="text" id="pass-input" maxlength="4" placeholder="0000">
                <button class="opt-btn" id="submit-pass">ENTER</button>
            </div>
            <div id="opt-container"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
