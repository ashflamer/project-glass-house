<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARDEN OF GUILT: DREAM ROUTE</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #333; font-family: 'Georgia', serif; overflow: hidden; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #fff; width: 100%; height: 100%; max-width: 800px; max-height: 600px; image-rendering: pixelated; border: 2px solid #111; }
        #vignette { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%); }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; color: #888; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        #decay-bar { width: 140px; height: 5px; background: #222; margin-top: 5px; border: 1px solid #444; }
        #decay-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.8s; box-shadow: 0 0 10px #00ffcc; }
        #dialogue-wrap { position: absolute; bottom: 40px; width: 80%; left: 10%; background: #fff; border: 3px solid #000; padding: 25px; display: none; z-index: 50; box-shadow: 10px 10px 0px rgba(0,0,0,0.15); }
        #text-content { font-size: 18px; line-height: 1.4; color: #111; margin-bottom: 20px; white-space: pre-line; }
        #input-area { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        #pass-input { border: 2px solid #000; padding: 8px; font-family: monospace; width: 100px; text-align: center; font-size: 20px; letter-spacing: 4px; }
        .opt-btn { background: #000; color: #fff; border: none; padding: 12px 24px; cursor: pointer; margin-right: 10px; margin-top: 8px; font-size: 12px; transition: 0.2s; }
        .opt-btn:hover { background: #00ffcc; color: #000; }
        #overlay { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #startBtn { border: 2px solid #000; background: none; padding: 18px 45px; cursor: pointer; letter-spacing: 6px; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-weight: normal; letter-spacing: 15px; margin-bottom: 40px;">GARDEN OF GUILT: DREAM ROUTE</h1>
        <button id="startBtn">OPEN EYES</button>
    </div>
    <div id="canvas-container">
        <div id="vignette"></div>
        <div id="ui">
            <div id="room-name">MAIN HALL</div>
            <div id="decay-bar"><div id="decay-fill"></div></div>
            <div style="margin-top:10px">MEMORIES: <span id="mem-count">0/4</span></div>
        </div>
        <div id="dialogue-wrap">
            <div id="text-content"></div>
            <div id="input-area">
                <input type="text" id="pass-input" maxlength="4" placeholder="0000">
                <button class="opt-btn" id="submit-pass">TRY CODE</button>
            </div>
            <div id="opt-container"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
